<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמנות הרישום</title>
<style>
:root{--bg:#faf7f2;--sur:#f0ebe2;--card:#fff;--ch:#f5efe5;--acc:#8a6010;--acc2:#a03820;--tx:#1a1610;--tx2:#5a5040;--bd:#d8cdb8;--r:14px}
.dm{--bg:#18161a;--sur:#211f24;--card:#2a272e;--ch:#332f38;--acc:#d4a843;--acc2:#c0603a;--tx:#f0ece4;--tx2:#9a9090;--bd:#3a3740}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;direction:rtl;transition:background .3s,color .3s;font-size:19px}
#app{max-width:940px;margin:0 auto;padding:0 16px 60px}
#app.ai-view{max-width:100%;padding:0;margin:0}
/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 0 12px;border-bottom:1px solid var(--bd);margin-bottom:28px}
.hdr-title{font-size:26px;font-weight:800;color:var(--acc);letter-spacing:.5px}
.hdr-sub{font-size:14px;color:var(--tx2);margin-top:2px}
.hdr-btns{display:flex;gap:8px}
.ico-btn{background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:6px 13px;cursor:pointer;font-size:13px;transition:all .2s}
.ico-btn:hover{border-color:var(--acc);color:var(--acc)}
/* home */
.welcome{text-align:center;padding:10px 0 30px;color:var(--tx2);font-size:18px;line-height:1.7}
.welcome strong{color:var(--tx)}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:20px}
.hcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:28px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.hcard::after{content:'';position:absolute;bottom:0;right:0;width:100%;height:3px;background:var(--acc);transform:scaleX(0);transform-origin:right;transition:transform .25s}
.hcard:hover{background:var(--ch);transform:translateY(-4px);box-shadow:0 10px 28px #0005}
.hcard:hover::after{transform:scaleX(1)}
.hcard-icon{font-size:38px;margin-bottom:14px}
.hcard-title{font-size:22px;font-weight:700;color:var(--acc);margin-bottom:8px}
.hcard-desc{font-size:16px;color:var(--tx2);line-height:1.7}
/* section list */
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.back-btn{background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:7px 15px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap}
.back-btn:hover{border-color:var(--acc);color:var(--acc)}
.sec-title{font-size:24px;font-weight:700;color:var(--tx)}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:16px}
.icard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s}
.icard:hover{background:var(--ch);transform:translateY(-2px);box-shadow:0 6px 18px #0003;border-color:var(--acc)}
.icard-num{font-size:11px;color:var(--tx2);margin-bottom:5px}
.icard-title{font-size:18px;font-weight:600;color:var(--tx);margin-bottom:5px}
.icard-sub{font-size:15px;color:var(--tx2)}
/* detail */
.detail{max-width:740px;margin:0 auto}
.dtitle{font-size:30px;font-weight:800;color:var(--acc);margin-bottom:4px}
.dsub{font-size:17px;color:var(--tx2);margin-bottom:10px}
.dbody{font-size:18px;line-height:1.9;color:var(--tx);margin-bottom:12px}
.svg-wrap{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin:20px 0;text-align:center}
.svg-lbl{font-size:12px;color:var(--tx2);margin-top:10px;font-style:italic}
.tips{background:var(--sur);border-right:3px solid var(--acc);border-radius:8px;padding:16px 20px;margin:20px 0}
.tips-t{font-size:17px;font-weight:700;color:var(--acc);margin-bottom:10px}
.tips ul{list-style:none;padding:0}
.tips li{font-size:17px;color:var(--tx);padding:7px 0;border-bottom:1px solid var(--bd)}
.tips li:last-child{border:none}
.tips li::before{content:'▸ ';color:var(--acc)}
/* tutorial steps */
.steps{display:flex;flex-direction:column;gap:18px;margin-top:16px}
.step{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;display:flex;gap:18px;align-items:flex-start}
.step-n{background:var(--acc);color:#111;font-weight:800;font-size:15px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-body{flex:1}
.step-title{font-size:18px;font-weight:600;color:var(--tx);margin-bottom:5px}
.step-desc{font-size:16px;color:var(--tx2);line-height:1.7}
.step-svg{margin-top:14px;background:var(--sur);border-radius:8px;padding:12px;text-align:center}
/* artwork */
.art-hdr{display:flex;gap:22px;align-items:flex-start;margin-bottom:24px}
.art-img{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:14px;min-width:190px;text-align:center;flex-shrink:0}
.art-meta{flex:1}
.art-artist{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:3px}
.art-year{font-size:13px;color:var(--tx2);margin-bottom:6px}
.art-period{display:inline-block;background:var(--acc);color:#111;font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;margin-bottom:12px}
.art-desc{font-size:17px;color:var(--tx);line-height:1.8}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.tag{background:var(--sur);border:1px solid var(--bd);color:var(--tx2);font-size:12px;padding:4px 12px;border-radius:20px}
.analysis-t{font-size:16px;font-weight:700;color:var(--acc);margin:20px 0 10px}
.analysis-b{font-size:17px;color:var(--tx);line-height:1.8}
@media(max-width:600px){.art-hdr{flex-direction:column}.step{flex-direction:column}.home-grid{grid-template-columns:1fr}}
/* ── Oil Painting ── */
.oil-intro{font-size:18px;color:var(--tx);line-height:1.9;margin-bottom:18px;padding-right:16px;border-right:4px solid var(--acc)}
.oil-details{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin:18px 0}
.oil-card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:18px 20px;border-top:3px solid var(--acc)}
.oil-card h4{font-size:16px;font-weight:700;color:var(--acc);margin-bottom:10px}
.oil-card p{font-size:16px;color:var(--tx2);line-height:1.75}
.oil-badge{display:inline-block;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px}
.hcard.oil-main{background:linear-gradient(135deg,#fff8ec,#fef3dc);border:2px solid var(--acc)!important;grid-column:1/-1}
.hcard.oil-main:hover{background:linear-gradient(135deg,#fef3dc,#fde8bc)}
.dm .hcard.oil-main{background:linear-gradient(135deg,#2a1800,#3d2b0a)}
.dm .hcard.oil-main:hover{background:linear-gradient(135deg,#3d2b10,#4d3b18)}
.hcard.ai-card{grid-column:1/-1;border:2px solid #4a6a9a;background:linear-gradient(135deg,#eef3f8,#dde8f4)}
.hcard.ai-card .hcard-title{color:#2a5080}
.dm .hcard.ai-card{background:linear-gradient(135deg,#1a2234,#1e2840);border-color:#5580aa}
.dm .hcard.ai-card .hcard-title{color:#7ab0e0}
.hcard.ai-card-hero{padding:32px 36px;border-width:3px;box-shadow:0 4px 20px rgba(74,106,154,.18)}
.hcard.ai-card-hero:hover{box-shadow:0 10px 32px rgba(74,106,154,.28)}
.home-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.home-row .hcard{padding:18px 16px}
.home-row .hcard-icon{font-size:26px;margin-bottom:8px}
.home-row .hcard-title{font-size:16px;margin-bottom:5px}
.home-row .hcard-desc{font-size:13px;line-height:1.55}
@media(max-width:640px){.home-row{grid-template-columns:repeat(2,1fr)}}
.hcard.oil-main .hcard-title{color:var(--acc);font-size:22px}
.hcard.oil-main .hcard-desc{font-size:14px;line-height:1.7}
.hcard.oil-main::after{background:linear-gradient(90deg,var(--acc2),var(--acc))}
.oil-sec-title{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:2px}
.oil-sec-sub{font-size:13px;color:var(--tx2);margin-bottom:10px}
.oil-section-hdr{font-size:14px;font-weight:700;color:var(--tx);margin:22px 0 10px;padding-right:12px;border-right:3px solid var(--acc2)}
.oil-exercises{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:6px}
.oil-exercise{background:var(--ch);border:1px solid #3a5a3a;border-radius:8px;padding:14px;border-right:3px solid #5a9a5a}
.oil-exercise h4{font-size:15px;color:#5a8a5a;margin-bottom:6px;font-weight:700}
.oil-exercise p{font-size:15px;color:var(--tx2);line-height:1.7}
.oil-mistakes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.oil-mistake{background:var(--ch);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-right:3px solid var(--acc2);display:flex;gap:12px;align-items:flex-start}
.oil-mistake-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.oil-mistake-body h4{font-size:15px;color:var(--acc2);margin-bottom:4px;font-weight:700}
.oil-mistake-body p{font-size:15px;color:var(--tx2);line-height:1.7}
.masters-box{background:linear-gradient(135deg,rgba(196,146,42,.08),rgba(192,96,58,.08))!important;border-color:var(--acc)!important}
.masters-box p{font-size:13px;color:var(--tx);line-height:1.75;margin:0}
/* ── Full-page AI View ── */
.ai-page{min-height:100vh;display:flex;flex-direction:column}
.ai-page-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:2px solid var(--bd);background:var(--ch);flex-wrap:wrap;gap:12px}
.ai-page-title{font-size:28px;font-weight:800;color:var(--acc)}
.ai-page-sub{font-size:16px;color:var(--tx2);margin-top:4px}
.ai-page-hdr-right{display:flex;gap:10px;align-items:center}
.ai-key-row{display:flex;gap:10px;align-items:center;padding:12px 32px;background:var(--sur);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.ai-key-label{font-size:16px;color:var(--tx2);font-weight:600;white-space:nowrap}
.ai-key-input{flex:1;min-width:220px;background:var(--bg);border:1.5px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 13px;font-size:16px;font-family:monospace}
.ai-key-input:focus{outline:none;border-color:var(--acc)}
.ai-key-btn{background:var(--acc);color:#111;border:none;border-radius:8px;padding:9px 22px;font-size:16px;cursor:pointer;font-weight:700;white-space:nowrap}
.ai-tabs{display:flex;border-bottom:2px solid var(--bd);background:var(--sur)}
.ai-tab{flex:1;padding:18px 0;background:none;border:none;color:var(--tx2);cursor:pointer;font-size:19px;font-weight:600;transition:all .2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.ai-tab.active{color:var(--acc);border-bottom:3px solid var(--acc);background:var(--bg)}
.ai-tab:hover:not(.active){color:var(--acc);background:var(--ch)}
.ai-chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:500px}
.ai-messages{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:16px}
.ai-msg{max-width:82%;padding:16px 22px;border-radius:16px;font-size:19px;line-height:1.85;word-break:break-word}
.ai-msg.user{align-self:flex-end;background:var(--acc);color:#111;border-radius:18px 18px 4px 18px;font-weight:500}
.ai-msg.bot{align-self:flex-start;background:var(--card);color:var(--tx);border:1.5px solid var(--bd);border-radius:18px 18px 18px 4px}
.ai-msg.bot.thinking{color:var(--tx2);font-style:italic;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.ai-input-row{display:flex;gap:12px;padding:18px 32px;border-top:2px solid var(--bd);background:var(--sur)}
.ai-input{flex:1;background:var(--bg);border:1.5px solid var(--bd);color:var(--tx);border-radius:14px;padding:14px 18px;font-size:19px;resize:none;font-family:inherit;line-height:1.6}
.ai-input:focus{outline:none;border-color:var(--acc)}
.ai-send{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:14px;padding:14px 24px;font-size:22px;cursor:pointer;font-weight:700;transition:transform .15s;align-self:flex-end}
.ai-send:hover{transform:scale(1.06)}
.ai-send:disabled{opacity:.4;cursor:default;transform:none}
.ai-article-wrap{padding:32px;display:flex;flex-direction:column;gap:18px;max-width:960px}
.ai-file-label{display:block;background:var(--sur);border:2px dashed var(--bd);color:var(--tx2);border-radius:12px;padding:16px 22px;cursor:pointer;font-size:17px;text-align:center;transition:all .2s}
.ai-file-label:hover{border-color:var(--acc);color:var(--acc)}
.ai-article-area{background:var(--bg);border:1.5px solid var(--bd);color:var(--tx);border-radius:12px;padding:16px 20px;font-size:18px;resize:vertical;min-height:180px;font-family:inherit;line-height:1.75}
.ai-article-area:focus{outline:none;border-color:var(--acc)}
.ai-analyze-btn{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:12px;padding:16px;font-size:19px;font-weight:700;cursor:pointer;transition:opacity .2s}
.ai-analyze-btn:disabled{opacity:.45;cursor:default}
.ai-result{background:var(--card);border:1.5px solid var(--bd);border-radius:12px;padding:26px 30px;font-size:18px;color:var(--tx);line-height:1.85}
.ai-image-wrap{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 220px)}
.ai-image-left{padding:24px 22px;border-left:1px solid var(--bd);background:var(--sur);display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.ai-image-right{padding:32px 36px;display:flex;flex-direction:column;background:var(--bg)}
.ai-img-upload-area{border:2px dashed var(--bd);border-radius:14px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--ch);display:block}
.ai-img-upload-area:hover,.ai-img-upload-area.has-img{border-color:var(--acc);border-style:solid}
.ai-img-upload-icon{font-size:42px;margin-bottom:10px}
.ai-img-upload-text{font-size:17px;color:var(--tx2);font-weight:600}
.ai-img-upload-sub{font-size:14px;color:var(--tx2);margin-top:4px;opacity:.7}
.ai-img-preview{width:100%;max-height:260px;object-fit:contain;border-radius:10px;display:none;margin-top:12px}
.ai-aspects-title{font-size:15px;font-weight:700;color:var(--tx2)}
.ai-aspect-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ai-aspect-btn{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;padding:11px 12px;font-size:15px;color:var(--tx2);cursor:pointer;text-align:right;transition:all .2s}
.ai-aspect-btn.selected{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}
.ai-aspect-btn:hover:not(.selected){border-color:var(--acc);color:var(--acc)}
.ai-full-btn{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:12px;padding:15px;font-size:18px;font-weight:700;cursor:pointer;transition:opacity .2s}
.ai-full-btn:disabled{opacity:.4;cursor:default}
.ai-response-hdr{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--bd)}
.ai-response-area{flex:1;background:var(--card);border:1.5px solid var(--bd);border-radius:16px;padding:28px 34px;overflow-y:auto;font-size:19px;line-height:1.9;color:var(--tx);min-height:400px}
.ai-response-placeholder{color:var(--tx2);text-align:center;padding:80px 20px;font-size:18px;opacity:.7}
.ai-response-loading{color:var(--tx2);text-align:center;padding:80px 20px;font-size:18px;font-style:italic}
.ai-response-error{color:#c03820;background:rgba(192,56,32,.08);border:1px solid rgba(192,56,32,.3);border-radius:10px;padding:18px;font-size:17px}
.img-followup{margin-top:1.5rem;border-top:2px solid var(--bd);padding-top:1.4rem}
.img-followup-title{font-size:18px;font-weight:700;color:var(--tx2);margin-bottom:0.9rem}
.img-followup-msgs{display:flex;flex-direction:column;gap:0.7rem;max-height:340px;overflow-y:auto;margin-bottom:1rem}
.img-followup-msg{padding:12px 16px;border-radius:12px;font-size:18px;line-height:1.75;word-break:break-word}
.img-followup-msg.user{background:var(--acc);color:#111;align-self:flex-end;max-width:80%;border-radius:14px 14px 4px 14px;font-weight:500}
.img-followup-msg.bot{background:var(--card);border:1.5px solid var(--bd);align-self:flex-start;max-width:95%;border-radius:14px 14px 14px 4px}
.img-followup-msg.thinking{color:var(--tx2);font-style:italic}
.img-followup-row{display:flex;gap:0.6rem;align-items:flex-end;margin-top:0.4rem}
.img-followup-input{flex:1;padding:12px 16px;border-radius:10px;border:1.5px solid var(--bd);background:var(--ch);color:var(--tx);font-size:18px;resize:none;font-family:inherit;line-height:1.5}
.img-followup-input:focus{outline:none;border-color:var(--acc)}
.img-followup-btn{padding:12px 22px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;white-space:nowrap}
.img-followup-btn:hover:not(:disabled){opacity:.85}
.img-followup-btn:disabled{opacity:.45;cursor:default}
.fb-row{display:flex;align-items:center;gap:10px;padding:8px 32px;background:var(--sur);border-bottom:1px solid var(--bd);font-size:15px;color:var(--tx2);flex-wrap:wrap}
.fb-dot{width:9px;height:9px;border-radius:50%;background:#bbb;flex-shrink:0;display:inline-block;transition:background .3s}
.fb-dot.ok{background:#3c9c3c}
.fb-setup-link{background:none;border:1px solid var(--bd);color:var(--acc);border-radius:6px;padding:4px 12px;font-size:14px;cursor:pointer;font-weight:600;margin-right:auto}
.fb-setup-link:hover{background:var(--acc);color:#111}
.fb-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
.fb-modal{background:var(--card);border-radius:16px;padding:30px 32px;max-width:520px;width:100%;box-shadow:0 24px 64px #0009;direction:rtl}
.fb-modal h3{font-size:20px;font-weight:800;color:var(--acc);margin-bottom:1rem}
.fb-steps{font-size:15px;color:var(--tx);line-height:2.2;margin-bottom:1.2rem;background:var(--sur);border-radius:8px;padding:14px 16px}
.fb-steps a{color:var(--acc);font-weight:600}
.fb-modal-ta{width:100%;height:120px;background:var(--ch);border:1.5px solid var(--bd);border-radius:8px;padding:11px 13px;font-size:13px;font-family:monospace;color:var(--tx);resize:none;margin-top:4px}
.fb-modal-ta:focus{outline:none;border-color:var(--acc)}
.fb-modal-row{display:flex;gap:10px;margin-top:12px}
.fb-modal-save{background:var(--acc);color:#111;border:none;border-radius:8px;padding:10px 22px;font-size:16px;font-weight:700;cursor:pointer}
.fb-modal-cancel{background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:10px 18px;font-size:16px;cursor:pointer}
.md-content{font-size:19px;line-height:1.9;color:var(--tx);direction:rtl}
.md-content h1,.md-content h2{color:var(--acc);border-bottom:2px solid var(--bd);padding-bottom:10px;margin:28px 0 16px;font-size:23px}
.md-content h3{color:var(--acc2);font-size:21px;margin:22px 0 10px}
.md-content h4{color:var(--tx);font-size:19px;margin:16px 0 8px;font-weight:700}
.md-content p{margin-bottom:14px}
.md-content ul,.md-content ol{padding-right:26px;margin-bottom:14px}
.md-content li{margin-bottom:9px;font-size:19px}
.md-content strong{color:var(--acc2);font-weight:700}
.md-content em{color:var(--tx2);font-style:italic}
.md-content code{background:var(--ch);border:1px solid var(--bd);border-radius:5px;padding:2px 8px;font-family:monospace;font-size:17px}
.md-content blockquote{border-right:5px solid var(--acc);padding:12px 20px;background:var(--ch);border-radius:0 10px 10px 0;margin:14px 0;color:var(--tx2);font-style:italic;font-size:18px}
.ai-msg.bot .md-content,.ai-result .md-content{font-size:19px}

/* ── Painters ── */
.hcard.painters-card{border:2px solid #5a8a3a;background:linear-gradient(135deg,#f0f8ec,#e4f2da)}

.dm .hcard.painters-card .hcard-title{color:#8adc5a}
.painters-page{padding:28px 0}
.painters-add-form{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:26px 28px;margin-bottom:32px}
.painters-add-form h3{font-size:21px;font-weight:800;color:var(--acc);margin-bottom:20px}
.pform-row{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.pform-label{font-size:16px;font-weight:600;color:var(--tx2)}
.pform-input{background:var(--bg);border:1.5px solid var(--bd);color:var(--tx);border-radius:10px;padding:12px 16px;font-size:17px;font-family:inherit;width:100%;transition:border-color .2s}
.pform-input:focus{outline:none;border-color:var(--acc)}
textarea.pform-input{resize:vertical;min-height:90px;line-height:1.6}
.pform-btn{background:linear-gradient(135deg,#5a8a3a,#3a6a1a);color:#fff;border:none;border-radius:10px;padding:13px 32px;font-size:18px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px}
.pform-btn:hover{opacity:.88}
.pform-saved-msg{margin-top:10px;background:#e8f8e0;border:1.5px solid #5a8a3a;border-radius:8px;padding:10px 16px;font-size:17px;font-weight:600;color:#2a6010}
.painters-list-hdr{font-size:20px;font-weight:800;color:var(--tx);margin-bottom:16px}
.painters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.painter-card{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:22px 24px;display:flex;flex-direction:column;gap:12px;transition:box-shadow .2s,transform .2s}
.painter-card:hover{box-shadow:0 6px 20px #0003;transform:translateY(-2px)}
.painter-name{font-size:20px;font-weight:800;color:var(--acc)}
.painter-desc{font-size:17px;color:var(--tx2);line-height:1.7;flex:1}
.painter-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.painter-link-btn{background:linear-gradient(135deg,#3a6a1a,#5a8a3a);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s}
.painter-link-btn:hover{opacity:.85}
.painter-del-btn{background:none;border:1.5px solid var(--bd);color:var(--tx2);border-radius:8px;padding:9px 14px;font-size:15px;cursor:pointer;transition:all .2s;margin-right:auto}
.painter-del-btn:hover{border-color:#c03820;color:#c03820}
.painters-empty{text-align:center;padding:50px 20px;color:var(--tx2);font-size:18px;opacity:.7}
@media(max-width:600px){.painters-grid{grid-template-columns:1fr}}
/* ── Saved Analyses ── */
.saved-wrap{padding:28px 32px;max-width:1100px}
.saved-hdr{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:22px;display:flex;align-items:center;gap:12px}
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.saved-card{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s}
.saved-card:hover{box-shadow:0 8px 24px #0004;transform:translateY(-3px)}
.saved-thumb{width:100%;height:160px;object-fit:cover;display:block;background:var(--sur)}
.saved-thumb-ph{width:100%;height:160px;background:var(--sur);display:flex;align-items:center;justify-content:center;font-size:40px}
.saved-card-body{padding:14px 16px}
.saved-card-date{font-size:14px;color:var(--tx2);margin-bottom:6px}
.saved-card-preview{font-size:15px;color:var(--tx);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.saved-card-del{display:block;width:100%;background:none;border:none;border-top:1px solid var(--bd);color:var(--tx2);padding:10px;font-size:14px;cursor:pointer;transition:color .2s;text-align:center}
.saved-card-del:hover{color:#c03820}
.saved-empty{text-align:center;padding:60px 20px;color:var(--tx2);font-size:18px;opacity:.7}
/* Saved analysis detail modal */
.saved-modal-bg{position:fixed;inset:0;background:#0008;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.saved-modal{background:var(--bg);border-radius:16px;max-width:860px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #000c}
.saved-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:1}
.saved-modal-title{font-size:20px;font-weight:800;color:var(--acc)}
.saved-modal-close{background:none;border:1.5px solid var(--bd);color:var(--tx2);border-radius:8px;padding:7px 14px;font-size:16px;cursor:pointer}
.saved-modal-close:hover{border-color:var(--acc);color:var(--acc)}
.saved-modal-body{display:flex;gap:24px;padding:24px;flex-wrap:wrap}
.saved-modal-img{width:260px;border-radius:10px;object-fit:contain;flex-shrink:0;align-self:flex-start;border:1px solid var(--bd)}
.saved-modal-text{flex:1;min-width:260px}
@media(max-width:600px){.saved-wrap{padding:16px}.saved-modal-body{flex-direction:column}.saved-modal-img{width:100%}}

let view = 'home', section = null, itemId = null;

function setView(v, s, id) {
  view = v; section = s; itemId = id;
  render();
}

function render() {
  const app = document.getElementById('app');
  app.className = view === 'ai' ? 'ai-view' : '';
  let html = view !== 'ai' ? `<div class="hdr">
    <div><div class="hdr-title">✏️ אמנות הרישום</div><div class="hdr-sub">מדריך לאמנים מנוסים</div></div>
    <div class="hdr-btns"><button class="ico-btn" onclick="toggleTheme()">☀️ / 🌙</button></div>
  </div>` : '';

  if (view === 'home')           html += renderHome();
  else if (view === 'list')      html += renderList();
  else if (view === 'detail')    html += renderDetail();
  else if (view === 'ai')        html += renderAI();
  else if (view === 'painters')  html += renderPainters();

  app.innerHTML = html;
  if (view === 'ai') afterRenderAI();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function painterAdd() {
  const nameEl = document.getElementById('p-name');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); nameEl.style.borderColor = '#c03820'; return; }
  nameEl.style.borderColor = '';
  const url  = document.getElementById('p-url').value.trim();
  const desc = document.getElementById('p-desc').value.trim();
  const list = paintersLoad();
  list.unshift({ id: Date.now().toString(), name, url, desc });
  paintersSave(list);

  // clear form
  nameEl.value = '';
  document.getElementById('p-url').value = '';
  document.getElementById('p-desc').value = '';

  // show confirmation
  const msg = document.getElementById('p-saved-msg');
  if (msg) { msg.style.display = 'block'; setTimeout(() => { msg.style.display = 'none'; }, 3000); }

  // refresh only the list section without full re-render
  const listHdr = document.querySelector('.painters-list-hdr');
  const listArea = document.querySelector('.painters-grid, .painters-empty');
  if (listHdr) listHdr.textContent = `הרשימה שלי (${list.length})`;
  if (listArea) {
    const newGrid = document.createElement('div');
    newGrid.className = 'painters-grid';
    newGrid.innerHTML = list.map(p => `
      <div class="painter-card">
        <div class="painter-name">${esc(p.name)}</div>
        ${p.desc ? `<div class="painter-desc">${esc(p.desc)}</div>` : ''}
        <div class="painter-actions">
          ${p.url ? `<a class="painter-link-btn" href="${esc(p.url)}" target="_blank" rel="noopener">🌐 לאתר</a>` : ''}
          <button class="painter-del-btn" onclick="painterDelete('${p.id}')">🗑 מחק</button>
        </div>
      </div>`).join('');
    listArea.replaceWith(newGrid);
    newGrid.firstElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function painterDelete(id) {
  if (!confirm('למחוק את הצייר הזה מהרשימה?')) return;
  const list = paintersLoad().filter(p => p.id !== id);
  paintersSave(list);
  render();
}

/* ── Firebase Firestore sync ── */
// Keeps saved analyses in sync across all devices automatically.
// Falls back to localStorage-only when Firebase is not configured.

let fbDB = null;
let fbUnsubscribe = null;
let fbLastError = null;   // last Firebase error — shown in debug panel
let fbLastSync  = null;   // timestamp of last successful onSnapshot

function fbConfigGet() {
  try { return JSON.parse(localStorage.getItem('fb_config') || 'null'); }
  catch(e) { return null; }
}

function fbInit() {
  const cfg = fbConfigGet();
  if (!cfg || !cfg.projectId) return;
  try {
    if (typeof firebase === 'undefined') return;
    if (firebase.apps.length === 0) firebase.initializeApp(cfg);
    fbDB = firebase.firestore();
    if (fbUnsubscribe) fbUnsubscribe();
    // Real-time listener: any change in Firestore updates localStorage + UI
    fbUnsubscribe = fbDB.collection('analyses').limit(SAVED_MAX)
      .onSnapshot(snap => {
        // Sort newest-first by id (which is Date.now() string)
        const list = snap.docs
          .map(d => { const v = d.data(); return { id:d.id, date:v.date, thumb:v.thumb||null, fullImg:v.fullImg||null, text:v.text }; })
          .sort((a, b) => Number(b.id) - Number(a.id));
        fbLastSync = new Date().toLocaleTimeString('he-IL');
        savedStore(list);
        // Refresh the saved tab if it is currently visible
        const el = document.getElementById('ai-saved-view');
        if (el && el.style.display !== 'none') el.innerHTML = renderSavedAnalyses();
        const tab = document.getElementById('ai-tab-saved');
        if (tab) tab.textContent = `📚 ניתוחים שמורים (${list.length})`;
      }, err => {
        fbLastError = err.message;
        const s = document.getElementById('fb-status-text');
        if (s) s.textContent = '🔴 Firebase שגיאה: ' + err.message;
      });
  } catch(e) { console.error('[Firebase init]', e.message); }
}

async function fbSave(entry) {
  if (!fbDB) return;
  try {
    await fbDB.collection('analyses').doc(entry.id).set({
      date: entry.date, thumb: entry.thumb || null,
      fullImg: entry.fullImg || null, text: entry.text,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    fbLastError = e.message;
    const s = document.getElementById('fb-status-text');
    if (s) s.textContent = '🔴 שגיאת שמירה: ' + e.message;
  }
}

function fbFetchNow(containerEl) {
  // Direct one-time fetch from Firestore — used when opening the saved tab
  // so we always show the latest data from all devices, not just the cache.
  if (!fbDB) return;
  const el = containerEl || document.getElementById('ai-saved-view');
  if (!el) return;
  fbDB.collection('analyses').limit(SAVED_MAX).get()
    .then(snap => {
      const list = snap.docs
        .map(d => { const v = d.data(); return { id:d.id, date:v.date, thumb:v.thumb||null, fullImg:v.fullImg||null, text:v.text }; })
        .sort((a, b) => Number(b.id) - Number(a.id));
      savedStore(list);
      el.innerHTML = renderSavedAnalyses();
      const tabBtn = document.getElementById('ai-tab-saved');
      if (tabBtn) tabBtn.textContent = `📚 ניתוחים שמורים (${list.length})`;
    })
    .catch(err => console.error('[Firebase fetch]', err.message));
}

function fbShowDebug() {
  const localCount = savedLoad().length;
  const cfg = fbConfigGet();
  const modal = document.createElement('div');

async function fbSaveConfig() {
  const raw = document.getElementById('fb-cfg-ta').value.trim();
  const btn = document.getElementById('fb-modal-save-btn');
  try {
    const cfg = JSON.parse(raw);
    if (!cfg.projectId) throw new Error('חסר projectId');
    localStorage.setItem('fb_config', JSON.stringify(cfg));
    btn.textContent = '⏳ מעלה נתונים...'; btn.disabled = true;
    if (firebase.apps.length === 0) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const local = savedLoad();
    // Upload each entry individually — skip any that fail (too large, etc.)
    // Each upload has a 5-second timeout so we never get stuck
    for (const entry of local) {
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000));
      const upload = db.collection('analyses').doc(entry.id).set({
        date: entry.date, thumb: entry.thumb||null,
        fullImg: entry.fullImg||null, text: entry.text,
        ts: firebase.firestore.FieldValue.serverTimestamp()
      });
      await Promise.race([upload, timeout]).catch(err => {
        console.warn('[fb migrate] skipped entry', entry.id, err.message);
      });
    }
    document.querySelector('.fb-modal-bg')?.remove();
    location.reload();
  } catch(e) { alert('שגיאה: ' + e.message); if(btn){btn.textContent='☁️ חברי';btn.disabled=false;} }
}

function savedShrinkImage(dataUrl, maxPx) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

async function savedAddAnalysis(responseText) {
  const thumb = aiImageDataUrl ? await savedShrinkImage(aiImageDataUrl, 400) : null;

  const list = savedLoad();

  list.unshift(entry);

}

const AI_SYSTEM = `אתה עוזר מומחה לאמנות הציור, בעיקר ציור בצבעי שמן. אתה מתמחה ב:
- טונאליות: ערכי אפל-בהיר, סולם טון, "טון לפני גוון"

- רוויה (Chroma): שליטה ברוויה, מה גורם לשינויה
- ציור נוף: פרספקטיבה אטמוספרית, שינויי גוון/טון/רוויה עם מרחק
- ציור פנים ועור: אזורי צבע בפנים, subsurface scattering, קימורי האף, הבדלי צבע בין צד מואר לצד בצל
- טכניקות שמן: Fat over Lean, Glazing, Wet-on-Wet, Impasto
ענה תמיד בעברית. השתמש ב-Markdown — ## לכותרות, ** להדגשות, - לנקודות. שאלה פשוטה = תשובה קצרה. שאלה מורכבת = פרט עם כותרות.`;

async function callGemini(messages, system) {
  const key = localStorage.getItem('gemini_key');
  if (!key) return 'נא להזין מפתח API תחילה (שדה המפתח למעלה).';
  try {
    const body = {
      system_instruction: { parts: [{ text: system || AI_SYSTEM }] },
      contents: messages.map(m => ({ role: m.role, parts: [{ text: m.text }] }))
    };
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    const data = await res.json();
    if (data.error) return `שגיאה: ${data.error.message}`;
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'לא התקבלה תשובה.';
  } catch(e) { return 'שגיאת חיבור — בדקי אינטרנט ומפתח.'; }
}

//
// To turn an Instagram URL into actual video bytes we use the Cobalt public
// API (https://cobalt.tools) — a free, open-source media resolver.
// Cobalt returns a "tunnel" URL that proxies the video through cobalt.tools
// servers with CORS headers, so we can fetch it directly from the browser.
//
// Flow:
//   1. detectInstagramUrls  — find every instagram.com/reel|p|tv URL in text
//   2. resolveInstagramVideo — ask Cobalt → download bytes → base64
//   3. callGeminiMultimodal  — send text + inline_data video part to Gemini
//
// Gemini receives the ACTUAL video bytes (inline_data), not a URL string.

function detectInstagramUrls(text) {
  // Matches instagram.com/reel/*, /p/*, /tv/* with optional ?query
  const re = /https?:\/\/(www\.)?instagram\.com\/(reel|p|tv)\/[\w-]+\/?(?:\?[^\s]*)?/gi;
  return [...text.matchAll(re)].map(m => m[0]);
}

async function resolveInstagramVideo(instagramUrl) {
  // ── Step 1: Resolve with Cobalt ─────────────────────────────────────────
  // POST the Instagram URL to the Cobalt API.
  // Cobalt returns a downloadable video URL (usually a tunnel through its
  // own servers, which has Access-Control-Allow-Origin: * so we can fetch it).
  let videoUrl;
  try {
    const cobaltRes = await fetch('https://api.cobalt.tools/', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: instagramUrl })
    });
    if (!cobaltRes.ok) {
      return { error: `שירות ההורדה החזיר שגיאה (${cobaltRes.status}).` };
    }
    const cobalt = await cobaltRes.json();
    if (cobalt.status === 'error' || !cobalt.url) {
      // Common causes: private post, age-gated, geo-blocked, removed
      return { error: 'לא הצלחתי לגשת לסרטון — ייתכן שהוא פרטי, הוסר, או חסום.' };
    }
    videoUrl = cobalt.url;
  } catch (e) {
    return { error: 'שירות ההורדה (Cobalt) לא זמין כרגע. נסי שוב מאוחר יותר.' };
  }

  // ── Step 2: Download the video bytes ────────────────────────────────────
  // Cobalt tunnel URLs go through cobalt.tools and include CORS headers,
  // so this fetch works directly from the browser without any proxy.
  let videoBlob;
  try {
    const videoRes = await fetch(videoUrl);
    if (!videoRes.ok) throw new Error(`HTTP ${videoRes.status}`);
    videoBlob = await videoRes.blob();
  } catch (e) {
    return {
      error: 'לא הצלחתי להוריד את הסרטון. ' +
             'אם הוא ציבורי — נסי שוב; אחרת הורידי אותו ידנית והעלי בלשונית "ניתוח ציור".'
    };
  }

  // ── Step 3: Check file size ──────────────────────────────────────────────
  // Gemini's inline_data limit is ~20MB. Most short Reels are well under it.
  const MAX_BYTES = 20 * 1024 * 1024;
  if (videoBlob.size > MAX_BYTES) {
    const mb = (videoBlob.size / 1024 / 1024).toFixed(1);
    return { error: `הסרטון גדול מדי (${mb}MB). Gemini מקבל עד 20MB — נסי קליפ קצר יותר.` };
  }

  // ── Step 4: Convert to base64 ────────────────────────────────────────────
  // Gemini's inline_data field expects base64-encoded bytes — NOT a URL.
  // This is what lets Gemini actually *see* the video content.
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload  = () => resolve({
      mimeType: videoBlob.type || 'video/mp4',
      data: reader.result.split(',')[1]   // strip "data:video/mp4;base64," prefix
    });
    reader.onerror = () => resolve({ error: 'שגיאה בעיבוד הסרטון.' });
    reader.readAsDataURL(videoBlob);
  });
}

async function callGeminiMultimodal(cleanedText, mediaItems, historyArr) {
  const key = localStorage.getItem('gemini_key');
  if (!key) return 'נא להזין מפתח API תחילה.';
  try {
    const mediaParts = mediaItems.map(m => ({
      inline_data: { mime_type: m.mimeType, data: m.data }
    }));
    const contents = [
      ...historyArr.map(m => ({ role: m.role, parts: [{ text: m.text }] })),
      { role: 'user', parts: [{ text: cleanedText }, ...mediaParts] }
    ];
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system_instruction: { parts: [{ text: AI_SYSTEM }] }, contents }) }
    );
    const data = await res.json();
    if (data.error) return `שגיאה: ${data.error.message}`;
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'לא התקבלה תשובה.';
  } catch(e) { return 'שגיאת חיבור — בדקי אינטרנט ומפתח.'; }
}

// ── Chat send ──────────────────────────────────────────────────────────────

async function sendAIChat() {
  const inp = document.getElementById('ai-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const igUrls = detectInstagramUrls(text);
  aiAddUser(text);
  const btn = document.getElementById('ai-send-btn');
  btn.disabled = true;
  const thinking = aiAddBot('חושב...', true);

  let reply;
  if (igUrls.length > 0) {
    thinking.textContent = `⏳ מוריד ${igUrls.length > 1 ? igUrls.length + ' סרטונים' : 'סרטון'} מאינסטגרם...`;
    const mediaResults = await Promise.all(igUrls.map(u => resolveInstagramVideo(u)));
    const firstError = mediaResults.find(m => m.error);
    if (firstError) {
      thinking.remove();
      aiAddBot('❌ ' + firstError.error);
      btn.disabled = false;
      return;
    }
    let cleanedText = text;
    igUrls.forEach((u, i) => {
      cleanedText = cleanedText.replace(u, igUrls.length > 1 ? `(סרטון ${i + 1} מצורף)` : '(הסרטון מצורף)');
    });
    thinking.textContent = '⏳ מנתח סרטון...';
    reply = await callGeminiMultimodal(cleanedText, mediaResults, aiHistory);
    aiHistory.push({ role: 'user', text });
    aiHistory.push({ role: 'model', text: reply });
  } else {
    aiHistory.push({ role: 'user', text });
    reply = await callGemini(aiHistory);
    aiHistory.push({ role: 'model', text: reply });
  }

  thinking.remove();
  aiAddBot(reply);
  btn.disabled = false;
}

function aiLoadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('ai-article-text').value = ev.target.result; };
  reader.onerror = () => { document.getElementById('ai-article-text').value = 'שגיאה בקריאת קובץ.'; };
  reader.readAsText(file, 'UTF-8');
}

async function aiAnalyzeArticle() {
  const text = document.getElementById('ai-article-text').value.trim();
  if (!text) return;
  const btn = document.getElementById('ai-analyze-btn');
  const result = document.getElementById('ai-result');
  btn.disabled = true;
  result.style.display = 'block';
  result.innerHTML = '<div class="ai-response-loading">⏳ מנתח מאמר...</div>';
  // Hide follow-up from any previous analysis
  const fu = document.getElementById('ai-article-followup');
  if (fu) fu.style.display = 'none';
  articleChatHistory = [];
  const prompt = `הנה מאמר/טקסט על ציור:\n\n${text.slice(0,8000)}\n\n## נקודות מפתח מהמאמר\nרשמי 3-5 נקודות מרכזיות\n\n## המלצות להוספה לאתר\nמה חשוב שטרם מכוסה?\n\n## מושגים מעניינים להרחבה\nמושגים שכדאי לפרט עליהם\n\nענה בעברית עם Markdown — ## לכותרות, ** להדגשות, - לנקודות.`;
  const reply = await callGemini([{ role: 'user', text: prompt }]);
  result.innerHTML = '<div class="md-content">' + mdParse(reply) + '</div>';
  // Seed history so follow-up questions have full context of article + analysis
  articleChatHistory = [
    { role: 'user', text: prompt },
    { role: 'model', text: reply }
  ];
  if (fu) {
    document.getElementById('article-followup-msgs').innerHTML = '';
    fu.style.display = 'block';
  }
  btn.disabled = false;
}

async function articleFollowupSend() {
  const inp = document.getElementById('article-followup-input');
  const text = inp.value.trim();
  if (!text || articleChatHistory.length === 0) return;
  inp.value = '';

  const msgs = document.getElementById('article-followup-msgs');

  const userDiv = document.createElement('div');
  userDiv.className = 'img-followup-msg user';
  userDiv.textContent = text;
  msgs.appendChild(userDiv);

  const botDiv = document.createElement('div');
  botDiv.className = 'img-followup-msg bot thinking';
  botDiv.textContent = '⏳ חושב...';
  msgs.appendChild(botDiv);
  msgs.scrollTop = msgs.scrollHeight;

  const btn = document.getElementById('article-followup-btn');
  btn.disabled = true;

  articleChatHistory.push({ role: 'user', text });
  const reply = await callGemini(articleChatHistory);
  articleChatHistory.push({ role: 'model', text: reply });

  botDiv.className = 'img-followup-msg bot';
  botDiv.innerHTML = '<div class="md-content">' + mdParse(reply) + '</div>';
  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = false;
}

async function imgFollowupSend() {
  const inp = document.getElementById('img-followup-input');
  const text = inp.value.trim();
  if (!text || !aiImageBase64) return;
  inp.value = '';

  const msgs = document.getElementById('img-followup-msgs');

  // User bubble
  const userDiv = document.createElement('div');
  userDiv.className = 'img-followup-msg user';
  userDiv.textContent = text;
  msgs.appendChild(userDiv);

  // Thinking bubble (replaced with reply when ready)
  const botDiv = document.createElement('div');
  botDiv.className = 'img-followup-msg bot thinking';
  botDiv.textContent = '⏳ חושב...';
  msgs.appendChild(botDiv);
  msgs.scrollTop = msgs.scrollHeight;

  const btn = document.getElementById('img-followup-btn');
  btn.disabled = true;

  const key = localStorage.getItem('gemini_key');
  if (!key) {
    botDiv.textContent = 'נא להזין מפתח API תחילה.';
    btn.disabled = false;
    return;
  }

  // Follow-up questions are plain text — Gemini remembers the painting
  // from the first exchange (image + initial analysis) already in imgChatHistory.
  imgChatHistory.push({ role: 'user', parts: [{ text }] });

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: AI_SYSTEM }] },
          contents: imgChatHistory
        })
      }
    );
    const data = await res.json();
    const reply = data.error
      ? `שגיאה: ${data.error.message}`
      : (data.candidates?.[0]?.content?.parts?.[0]?.text || 'לא התקבלה תשובה.');
    imgChatHistory.push({ role: 'model', parts: [{ text: reply }] });
    botDiv.className = 'img-followup-msg bot';
    botDiv.innerHTML = '<div class="md-content">' + mdParse(reply) + '</div>';
  } catch(e) {
    botDiv.className = 'img-followup-msg bot';
    botDiv.textContent = 'שגיאת חיבור — בדקי אינטרנט ומפתח.';
    imgChatHistory.pop(); // remove the failed turn so history stays clean
  }

  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = false;
}

function aiLoadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    const result = document.getElementById('ai-img-result');
    if (result) {
      result.innerHTML = '<div class="ai-response-error">❌ הקובץ שבחרת הוא <strong>' + esc(file.type || 'סרטון/קובץ לא מוכר') + '</strong> — Gemini יכול לנתח רק תמונות (JPG, PNG, WEBP). אנא העלי תמונת ציור.</div>';
      result.style.display = 'block';
    }
    return;
  }
  // New image → clear previous follow-up conversation
  imgChatHistory = [];
  const fu = document.getElementById('ai-img-followup');
  if (fu) { fu.style.display = 'none'; document.getElementById('img-followup-msgs').innerHTML = ''; }

  aiImageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    aiImageDataUrl = ev.target.result;
    aiImageBase64 = aiImageDataUrl.split(',')[1];
    const preview = document.getElementById('ai-img-preview');
    preview.src = aiImageDataUrl;
    preview.style.display = 'block';
    const drop = document.getElementById('ai-img-drop');
    drop.classList.add('has-img');
    drop.querySelector('.ai-img-upload-icon').textContent = '✅';
    drop.querySelector('.ai-img-upload-text').textContent = file.name;
    document.getElementById('ai-img-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('ai-aspect-btn')) e.target.classList.toggle('selected');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && document.activeElement && document.activeElement.id === 'ai-input') {
    e.preventDefault(); sendAIChat();
  }
});

async function aiAnalyzeImage() {
  if (!aiImageBase64) return;
  const key = localStorage.getItem('gemini_key');
  if (!key) { alert('נא להזין מפתח API תחילה'); return; }
  const aspectLabels = {
    tonality:'טונאליות (ערכי אפל-בהיר, קונטרסט, סולם טון)',
    color:'צבע ורוויה (גוונים, טמפרטורת צבע, הרמוניה, רוויה)',
    composition:'קומפוזיציה (כלל השליש, איזון, הובלת עין, מסגור)',
    focus:'מוקד עניין (איפה העין נמשכת ולמה)',
    light:'אור וצל (מקור אור, צלליות, reflected light, עומק)',
    perspective:'פרספקטיבה (עומק, אטמוספרה, מרחק)',
    technique:'טכניקה (משיכות מכחול, מרקם, שכבתיות)',
    suggest:'המלצות לשיפור (3-5 נקודות ספציפיות)'
  };
  const selected = [...document.querySelectorAll('.ai-aspect-btn.selected')].map(b => b.dataset.a);
  const aspects = selected.map(a => `• ${aspectLabels[a]}`).join('\n');
  const prompt = `**חשוב מאוד:** אם אינך יכול לראות את התמונה, אם הקובץ הוא סרטון/PDF/פורמט שאינך תומך בו, או אם התמונה לא ברורה — כתוב בדיוק: "❌ לא הצלחתי לראות את הקובץ. אנא העלי תמונה בפורמט JPG, PNG או WEBP." ואל תמשיך לנתח.

רק אם אתה רואה את התמונה בבירור — נתח לפי ההיבטים הבאים:\n\n${aspects}\n\nלכל היבט:\n- כותרת ## עם שם ההיבט\n- תיאור מה קיים בציור\n- הערכה: **חזק** / **דורש שיפור**\n- טיפ ספציפי לשיפור\n\nענה בעברית בלבד. השתמשי ב-Markdown.`;
  const btn = document.getElementById('ai-img-btn');
  const result = document.getElementById('ai-img-result');
  btn.disabled = true; btn.textContent = '⏳ מנתח...';
  result.innerHTML = '<div class="ai-response-loading">⏳ ה-AI מנתח את הציור שלך, אנא המתיני...</div>';
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
      { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
        contents:[{ parts:[
          { inline_data:{ mime_type: aiImageMime, data: aiImageBase64 } },
          { text: prompt }
        ]}]
      })}
    );
    const data = await res.json();
    if (data.error) {
      result.innerHTML = `<div class="ai-response-error">שגיאה: ${data.error.message}</div>`;
    } else {
      const t = data.candidates?.[0]?.content?.parts?.[0]?.text || 'לא התקבלה תשובה.';
      result.innerHTML = '<div class="md-content">' + mdParse(t) + '</div>';
      await savedAddAnalysis(t);
      const savedTab = document.getElementById('ai-tab-saved');
      if (savedTab) { savedTab.style.fontWeight = '800'; savedTab.textContent = `📚 ניתוחים שמורים (${savedLoad().length})`; }
      // Seed the follow-up history so Gemini knows about the image + the full
      // analysis. Subsequent questions are text-only (the image stays in context).
      imgChatHistory = [
        { role: 'user', parts: [
          { inline_data: { mime_type: aiImageMime, data: aiImageBase64 } },
          { text: prompt }
        ]},
        { role: 'model', parts: [{ text: t }] }
      ];
      // Show the follow-up chat area and clear any old messages
      const fu = document.getElementById('ai-img-followup');
      if (fu) {
        document.getElementById('img-followup-msgs').innerHTML = '';
        fu.style.display = 'block';
      }
    }
  } catch(err) {
    result.innerHTML = '<div class="ai-response-error">שגיאת חיבור — בדקי אינטרנט ומפתח.</div>';
  }
  btn.disabled = false; btn.textContent = '🔍 נתחי שוב';
}
